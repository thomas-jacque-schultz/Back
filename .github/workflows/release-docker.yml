name: release - docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    name: release - docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker image name
        id: image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          DOCKER_USERNAME_CLEAN="$(printf '%s' "$DOCKER_USERNAME" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"

          if [ -z "$DOCKER_USERNAME_CLEAN" ]; then
            echo "Error: DOCKER_USERNAME secret is empty"
            exit 1
          fi

          if ! printf '%s' "$DOCKER_USERNAME_CLEAN" | grep -Eq '^[a-z0-9]+([._-][a-z0-9]+)*$'; then
            echo "Error: DOCKER_USERNAME must be a valid Docker Hub namespace"
            exit 1
          fi

          echo "username=$DOCKER_USERNAME_CLEAN" >> "$GITHUB_OUTPUT"
          echo "repository=$DOCKER_USERNAME_CLEAN/schub-back" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.image.outputs.username }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.repository }}:latest
          cache-from: type=registry,ref=${{ steps.image.outputs.repository }}:buildcache
          cache-to: type=registry,ref=${{ steps.image.outputs.repository }}:buildcache,mode=max

      - name: Image pushed successfully
        run: |
          echo "✓ Docker image pushed: ${{ steps.image.outputs.repository }}:${{ steps.version.outputs.version }}"
          echo "✓ Docker image pushed: ${{ steps.image.outputs.repository }}:latest"
